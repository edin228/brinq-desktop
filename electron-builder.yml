appId: com.brinq.desktop
productName: Brinq
copyright: Copyright © 2026 Brinq

directories:
  output: dist

files:
  - src/**/*
  - assets/**/*
  - package.json

win:
  icon: assets/icon.ico
  target:
    - nsis
  artifactName: Brinq-Setup.${ext}
  fileAssociations:
    - ext: eml
      name: "Email Message"
      description: "Email Message File"
      role: Viewer
    - ext: msg
      name: "Outlook Message"
      description: "Outlook Message File"
      role: Viewer

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true

mac:
  icon: assets/icon.png
  target:
    - dmg
  artifactName: Brinq-${version}.${ext}
  category: public.app-category.productivity
  fileAssociations:
    - ext: eml
      name: "Email Message"
      role: Viewer
    - ext: msg
      name: "Outlook Message"
      role: Viewer

linux:
  icon: assets/icon.png
  target:
    - AppImage
  artifactName: Brinq-${version}.${ext}
  category: Office

publish:
  provider: github
  owner: edin228
  repo: brinq-desktop
